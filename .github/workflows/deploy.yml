name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run linter
        run: npm run lint

      - name: Run type check
        run: npx tsc --noEmit

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

      - name: Record revision to deploy
        id: revision
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Deploy to VPS via SSH
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          github.event_name == 'workflow_dispatch'
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail

          # Write private key
          echo "$VPS_SSH_KEY" > /tmp/vps_deploy_key
          chmod 600 /tmp/vps_deploy_key

          SSH_OPTS="-i /tmp/vps_deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=30 \
            -o BatchMode=yes"

          echo "→ Testing SSH connection..."
          ssh $SSH_OPTS ${VPS_USER}@${VPS_HOST} "echo '✅ SSH OK — $(hostname)'"

          echo "→ Deploying..."
          ssh $SSH_OPTS ${VPS_USER}@${VPS_HOST} bash << 'REMOTE'
            set -euo pipefail
            cd /root/nico-garay
            echo "Current SHA before: $(git rev-parse --short HEAD)"
            git fetch origin main
            git reset --hard origin/main
            echo "Current SHA after:  $(git rev-parse --short HEAD)"
            docker compose up -d --build
            echo "✅ Deployed at $(date)"
          REMOTE

          rm -f /tmp/vps_deploy_key

      - name: Verify VPS SHA matches deployed revision
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          github.event_name == 'workflow_dispatch'
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          EXPECT_SHA: ${{ steps.revision.outputs.sha }}
        run: |
          set -euo pipefail
          echo "$VPS_SSH_KEY" > /tmp/vps_deploy_key
          chmod 600 /tmp/vps_deploy_key

          VPS_SHA=$(ssh -i /tmp/vps_deploy_key \
            -o StrictHostKeyChecking=no -o ConnectTimeout=20 -o BatchMode=yes \
            ${VPS_USER}@${VPS_HOST} "cd /root/nico-garay && git rev-parse HEAD")
          rm -f /tmp/vps_deploy_key

          echo "Expected : $EXPECT_SHA"
          echo "VPS HEAD : $VPS_SHA"
          test "$VPS_SHA" = "$EXPECT_SHA" && echo "✅ SHA match" || (echo "❌ SHA mismatch" && exit 1)

      - name: Smoke test /api/health
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          github.event_name == 'workflow_dispatch'
        env:
          SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: |
          set -euo pipefail
          BASE="${SITE_URL:-https://photos.nicogaray.com}"
          BASE="${BASE%/}"
          for i in $(seq 1 12); do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 20 "$BASE/api/health" || echo "000")
            if [ "$code" = "200" ]; then
              echo "✅ Health OK (attempt $i) — $BASE"
              exit 0
            fi
            echo "Attempt $i: HTTP $code — retry in 10s..."
            sleep 10
          done
          echo "::error::Health check failed after 2 min — $BASE/api/health"
          exit 1
