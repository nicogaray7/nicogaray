name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run linter
        run: npm run lint

      - name: Run type check
        run: npx tsc --noEmit

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

      # ── SSH deploy (requires port 22 open from GitHub Actions IPs) ──────────
      # If the Hostinger hPanel firewall blocks port 22, this step is skipped.
      # The VPS auto-deploy cron job (/root/auto-deploy.sh) handles deployment
      # in that case and picks up the new commit within 1 minute.
      - name: Deploy to VPS via SSH
        if: |
          ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          github.event_name == 'workflow_dispatch') &&
          secrets.VPS_HOST != ''
        continue-on-error: true
        id: ssh_deploy
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          echo "$VPS_SSH_KEY" > /tmp/vps_deploy_key
          chmod 600 /tmp/vps_deploy_key

          SSH="ssh -i /tmp/vps_deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=15 \
            -o BatchMode=yes"

          echo "→ Testing SSH connection to $VPS_HOST..."
          $SSH ${VPS_USER}@${VPS_HOST} "echo '✅ SSH OK — $(hostname)'"

          echo "→ Deploying commit $(git rev-parse --short HEAD)..."
          $SSH ${VPS_USER}@${VPS_HOST} bash << 'REMOTE'
            set -euo pipefail
            cd /root/nico-garay
            git fetch origin main
            git reset --hard origin/main
            docker compose up -d --build
            docker compose exec -T app npx prisma migrate deploy 2>/dev/null || true
            echo "✅ Deployed $(git rev-parse --short HEAD) at $(date)"
          REMOTE
          rm -f /tmp/vps_deploy_key

      - name: SSH deploy status
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ steps.ssh_deploy.outcome }}" = "success" ]; then
            echo "✅ SSH deploy succeeded — VPS updated directly"
          else
            echo "⚠️  SSH deploy skipped/failed — VPS cron will deploy within 1 minute"
            echo "   Check: https://github.com/nicogaray7/nicogaray/actions for CI status"
            echo "   Check: ssh root@\$VPS_HOST 'tail -20 /var/log/auto-deploy.log'"
          fi

      - name: Smoke test /api/health
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          github.event_name == 'workflow_dispatch'
        env:
          SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: |
          set -euo pipefail
          BASE="${SITE_URL:-https://photos.nicogaray.com}"
          BASE="${BASE%/}"
          echo "Waiting for $BASE/api/health..."
          for i in $(seq 1 12); do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 20 "$BASE/api/health" || echo "000")
            if [ "$code" = "200" ]; then
              echo "✅ Health OK (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: HTTP $code — retry in 10s..."
            sleep 10
          done
          echo "::warning::Health check did not return 200 for $BASE/api/health"
          echo "Site may still be deploying via cron. Check manually."
          exit 0
