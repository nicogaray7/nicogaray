name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Generate Prisma client so TypeScript types are available for the build
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run linter
        run: npm run lint

      - name: Run type check
        run: npx tsc --noEmit

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

      - name: Record revision to deploy
        id: revision
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Deploy to VPS
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          github.event_name == 'workflow_dispatch'
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_ROOT_PASSWORD }}
          script: |
            set -euo pipefail
            cd /root/nico-garay
            git fetch origin main
            git reset --hard origin/main
            docker compose up -d --build
            echo "✅ Deployed $(git rev-parse --short HEAD) at $(date)"

      - name: Read VPS git HEAD
        id: vps_git
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          github.event_name == 'workflow_dispatch'
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_ROOT_PASSWORD }}
          capture_stdout: true
          script: |
            cd /root/nico-garay && git rev-parse HEAD

      - name: Assert VPS revision matches GitHub revision
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          VPS_SHA=$(printf '%s\n' '${{ steps.vps_git.outputs.stdout }}' | grep -oE '[a-f0-9]{40}' | tail -1)
          EXPECT_SHA='${{ steps.revision.outputs.sha }}'
          echo "Expected : $EXPECT_SHA"
          echo "VPS HEAD : $VPS_SHA"
          test -n "$VPS_SHA"
          test "$VPS_SHA" = "$EXPECT_SHA"

      - name: Smoke test /api/health
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          github.event_name == 'workflow_dispatch'
        env:
          SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: |
          set -euo pipefail
          BASE="${SITE_URL:-https://photos.nicogaray.com}"
          BASE="${BASE%/}"
          for i in $(seq 1 12); do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 20 "$BASE/api/health" || echo "000")
            if [ "$code" = "200" ]; then
              echo "✅ Health OK (attempt $i) — $BASE"
              exit 0
            fi
            echo "Attempt $i: HTTP $code — retry in 10s..."
            sleep 10
          done
          echo "::error::Health check failed after 2 min for $BASE/api/health"
          exit 1
